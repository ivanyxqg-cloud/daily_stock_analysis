name: 美股盘中雷达

on:
  schedule:
    # DST windows (ET = UTC-4)
    - cron: '25 13 * * 1-5'   # 09:25 ET pre-open
    - cron: '45 13 * * 1-5'   # 09:45 ET open +15m
    - cron: '30 14 * * 1-5'   # 10:30 ET open +60m
    - cron: '0 16 * * 1-5'    # 12:00 ET midday
    - cron: '30 19 * * 1-5'   # 15:30 ET power hour
    - cron: '15 20 * * 1-5'   # 16:15 ET close +15m
    # Standard-time windows (ET = UTC-5)
    - cron: '25 14 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 20 * * 1-5'
    - cron: '15 21 * * 1-5'

  workflow_dispatch:
    inputs:
      window:
        description: '盘中窗口'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - pre_open
          - open_15
          - open_60
          - midday
          - power_hour
          - close_15
      force_run:
        description: '强制运行（跳过交易日/窗口检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: us-intraday-radar
  cancel-in-progress: false

jobs:
  intraday-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 45))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行美股盘中雷达
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEYS: ${{ secrets.OPENAI_API_KEYS }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          LONGBRIDGE_REGION: ${{ vars.LONGBRIDGE_REGION || secrets.LONGBRIDGE_REGION }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'SPY,QQQ,VIX' }}
          PORTFOLIO_STOCK_LIST: ${{ vars.PORTFOLIO_STOCK_LIST || secrets.PORTFOLIO_STOCK_LIST || '' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'zh' }}
          MARKET_REVIEW_REGION: us
          US_INTRADAY_RADAR_ENABLED: ${{ vars.US_INTRADAY_RADAR_ENABLED || secrets.US_INTRADAY_RADAR_ENABLED || 'true' }}
          US_INTRADAY_WINDOWS: ${{ vars.US_INTRADAY_WINDOWS || secrets.US_INTRADAY_WINDOWS || 'pre_open,open_15,open_60,midday,power_hour,close_15' }}
          US_INTRADAY_PUSH_NIGHT: ${{ vars.US_INTRADAY_PUSH_NIGHT || secrets.US_INTRADAY_PUSH_NIGHT || 'true' }}
          US_INTRADAY_ALERT_HOLDING_CHANGE_PCT: ${{ vars.US_INTRADAY_ALERT_HOLDING_CHANGE_PCT || secrets.US_INTRADAY_ALERT_HOLDING_CHANGE_PCT || '2.5' }}
          US_INTRADAY_ALERT_INDEX_CHANGE_PCT: ${{ vars.US_INTRADAY_ALERT_INDEX_CHANGE_PCT || secrets.US_INTRADAY_ALERT_INDEX_CHANGE_PCT || '1.0' }}
          US_INTRADAY_ALERT_VIX_CHANGE_PCT: ${{ vars.US_INTRADAY_ALERT_VIX_CHANGE_PCT || secrets.US_INTRADAY_ALERT_VIX_CHANGE_PCT || '5.0' }}
          US_INTRADAY_OPPORTUNITY_MAX: ${{ vars.US_INTRADAY_OPPORTUNITY_MAX || secrets.US_INTRADAY_OPPORTUNITY_MAX || '5' }}
          US_INTRADAY_REPORT_LANGUAGE: ${{ vars.US_INTRADAY_REPORT_LANGUAGE || secrets.US_INTRADAY_REPORT_LANGUAGE || 'zh' }}
          US_INTRADAY_WINDOW_TOLERANCE_MINUTES: ${{ vars.US_INTRADAY_WINDOW_TOLERANCE_MINUTES || secrets.US_INTRADAY_WINDOW_TOLERANCE_MINUTES || '12' }}
          US_INTRADAY_READABLE_REPORT: ${{ vars.US_INTRADAY_READABLE_REPORT || secrets.US_INTRADAY_READABLE_REPORT || 'true' }}
          US_INTRADAY_JARGON_LEVEL: ${{ vars.US_INTRADAY_JARGON_LEVEL || secrets.US_INTRADAY_JARGON_LEVEL || 'explained' }}
          US_INTRADAY_MAX_ACTION_ITEMS: ${{ vars.US_INTRADAY_MAX_ACTION_ITEMS || secrets.US_INTRADAY_MAX_ACTION_ITEMS || '5' }}
          US_INTRADAY_SHOW_TECHNICAL_DETAILS: ${{ vars.US_INTRADAY_SHOW_TECHNICAL_DETAILS || secrets.US_INTRADAY_SHOW_TECHNICAL_DETAILS || 'false' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          LOG_LEVEL: INFO
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'yfinance,tencent,akshare_sina,efinance,akshare_em' }}
        run: |
          mkdir -p reports logs data
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi
          WINDOW="${{ github.event.inputs.window || 'auto' }}"
          echo "🧭 美股盘中雷达: window=$WINDOW force=${{ github.event.inputs.force_run || 'false' }}"
          python main.py --intraday-radar --intraday-window "$WINDOW" $FORCE_RUN_ARG

      - name: 上传盘中雷达报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: us-intraday-radar-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 14
