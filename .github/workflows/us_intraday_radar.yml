name: 美股盘中雷达

on:
  schedule:
    # Polling fallback. GitHub scheduled runs can be delayed or dropped, so
    # poll during the US session and let code decide whether a checkpoint is due.
    - cron: '2-59/5 13-20 * * 1-5' # DST session coverage (ET = UTC-4)
    - cron: '2-59/5 14-21 * * 1-5' # Standard-time session coverage (ET = UTC-5)
    # DST windows (ET = UTC-4)
    - cron: '25 13 * * 1-5'   # 09:25 ET pre-open
    - cron: '45 13 * * 1-5'   # 09:45 ET open +15m
    - cron: '0 14 * * 1-5'    # 10:00 ET open +30m
    - cron: '30 14 * * 1-5'   # 10:30 ET open +60m
    - cron: '0 16 * * 1-5'    # 12:00 ET midday
    - cron: '30 19 * * 1-5'   # 15:30 ET power hour
    - cron: '15 20 * * 1-5'   # 16:15 ET close +15m
    # Standard-time windows (ET = UTC-5)
    - cron: '25 14 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 20 * * 1-5'
    - cron: '15 21 * * 1-5'

  workflow_dispatch:
    inputs:
      window:
        description: '盘中窗口'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - pre_open
          - open_15
          - open_30
          - open_60
          - midday
          - power_hour
          - close_15
      force_run:
        description: '强制运行（跳过交易日/窗口检查）'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: us-intraday-radar
  cancel-in-progress: false

jobs:
  intraday-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 45))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行美股盘中雷达
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEYS: ${{ secrets.OPENAI_API_KEYS }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          LONGBRIDGE_REGION: ${{ vars.LONGBRIDGE_REGION || secrets.LONGBRIDGE_REGION }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'SPY,QQQ,VIX' }}
          PORTFOLIO_STOCK_LIST: ${{ vars.PORTFOLIO_STOCK_LIST || secrets.PORTFOLIO_STOCK_LIST || '' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'zh' }}
          MARKET_REVIEW_REGION: us
          US_INTRADAY_RADAR_ENABLED: ${{ vars.US_INTRADAY_RADAR_ENABLED || secrets.US_INTRADAY_RADAR_ENABLED || 'true' }}
          US_INTRADAY_WINDOWS: ${{ vars.US_INTRADAY_WINDOWS || secrets.US_INTRADAY_WINDOWS || 'pre_open,open_15,open_30,open_60,midday,power_hour,close_15' }}
          US_INTRADAY_PUSH_NIGHT: ${{ vars.US_INTRADAY_PUSH_NIGHT || secrets.US_INTRADAY_PUSH_NIGHT || 'true' }}
          US_INTRADAY_ALERT_HOLDING_CHANGE_PCT: ${{ vars.US_INTRADAY_ALERT_HOLDING_CHANGE_PCT || secrets.US_INTRADAY_ALERT_HOLDING_CHANGE_PCT || '2.5' }}
          US_INTRADAY_ALERT_INDEX_CHANGE_PCT: ${{ vars.US_INTRADAY_ALERT_INDEX_CHANGE_PCT || secrets.US_INTRADAY_ALERT_INDEX_CHANGE_PCT || '1.0' }}
          US_INTRADAY_ALERT_VIX_CHANGE_PCT: ${{ vars.US_INTRADAY_ALERT_VIX_CHANGE_PCT || secrets.US_INTRADAY_ALERT_VIX_CHANGE_PCT || '5.0' }}
          US_INTRADAY_OPPORTUNITY_MAX: ${{ vars.US_INTRADAY_OPPORTUNITY_MAX || secrets.US_INTRADAY_OPPORTUNITY_MAX || '5' }}
          US_INTRADAY_REPORT_LANGUAGE: ${{ vars.US_INTRADAY_REPORT_LANGUAGE || secrets.US_INTRADAY_REPORT_LANGUAGE || 'zh' }}
          US_INTRADAY_WINDOW_TOLERANCE_MINUTES: ${{ vars.US_INTRADAY_WINDOW_TOLERANCE_MINUTES || secrets.US_INTRADAY_WINDOW_TOLERANCE_MINUTES || '18' }}
          US_INTRADAY_CATCHUP_MINUTES: ${{ vars.US_INTRADAY_CATCHUP_MINUTES || secrets.US_INTRADAY_CATCHUP_MINUTES || '45' }}
          US_INTRADAY_CLOSE_CATCHUP_MINUTES: ${{ vars.US_INTRADAY_CLOSE_CATCHUP_MINUTES || secrets.US_INTRADAY_CLOSE_CATCHUP_MINUTES || '120' }}
          US_INTRADAY_READABLE_REPORT: ${{ vars.US_INTRADAY_READABLE_REPORT || secrets.US_INTRADAY_READABLE_REPORT || 'true' }}
          US_INTRADAY_JARGON_LEVEL: ${{ vars.US_INTRADAY_JARGON_LEVEL || secrets.US_INTRADAY_JARGON_LEVEL || 'explained' }}
          US_INTRADAY_MAX_ACTION_ITEMS: ${{ vars.US_INTRADAY_MAX_ACTION_ITEMS || secrets.US_INTRADAY_MAX_ACTION_ITEMS || '5' }}
          US_INTRADAY_SHOW_TECHNICAL_DETAILS: ${{ vars.US_INTRADAY_SHOW_TECHNICAL_DETAILS || secrets.US_INTRADAY_SHOW_TECHNICAL_DETAILS || 'false' }}
          US_INTRADAY_DEDUPE_ENABLED: ${{ vars.US_INTRADAY_DEDUPE_ENABLED || secrets.US_INTRADAY_DEDUPE_ENABLED || 'true' }}
          US_INTRADAY_DEDUPE_LOOKBACK_HOURS: ${{ vars.US_INTRADAY_DEDUPE_LOOKBACK_HOURS || secrets.US_INTRADAY_DEDUPE_LOOKBACK_HOURS || '24' }}
          US_INTRADAY_REQUIRE_FRESH_QUOTES: ${{ vars.US_INTRADAY_REQUIRE_FRESH_QUOTES || secrets.US_INTRADAY_REQUIRE_FRESH_QUOTES || 'true' }}
          US_INTRADAY_QUOTE_FRESHNESS_MINUTES: ${{ vars.US_INTRADAY_QUOTE_FRESHNESS_MINUTES || secrets.US_INTRADAY_QUOTE_FRESHNESS_MINUTES || '20' }}
          US_INTRADAY_PRE_OPEN_FAST_MODE: ${{ vars.US_INTRADAY_PRE_OPEN_FAST_MODE || secrets.US_INTRADAY_PRE_OPEN_FAST_MODE || 'true' }}
          US_COMMANDER_ENABLED: ${{ vars.US_COMMANDER_ENABLED || secrets.US_COMMANDER_ENABLED || 'true' }}
          US_COMMANDER_MODE: ${{ vars.US_COMMANDER_MODE || secrets.US_COMMANDER_MODE || 'swing_intraday' }}
          US_COMMANDER_RISK_STYLE: ${{ vars.US_COMMANDER_RISK_STYLE || secrets.US_COMMANDER_RISK_STYLE || 'balanced' }}
          US_COMMANDER_LLM_MODE: ${{ vars.US_COMMANDER_LLM_MODE || secrets.US_COMMANDER_LLM_MODE || 'triggered' }}
          US_COMMANDER_MAX_ACTIONS: ${{ vars.US_COMMANDER_MAX_ACTIONS || secrets.US_COMMANDER_MAX_ACTIONS || '5' }}
          US_COMMANDER_MAX_OPPORTUNITIES: ${{ vars.US_COMMANDER_MAX_OPPORTUNITIES || secrets.US_COMMANDER_MAX_OPPORTUNITIES || '3' }}
          US_COMMANDER_MIN_ALERT_SCORE: ${{ vars.US_COMMANDER_MIN_ALERT_SCORE || secrets.US_COMMANDER_MIN_ALERT_SCORE || '70' }}
          US_COMMANDER_MEMORY_ENABLED: ${{ vars.US_COMMANDER_MEMORY_ENABLED || secrets.US_COMMANDER_MEMORY_ENABLED || 'true' }}
          US_COMMANDER_LANGUAGE_STYLE: ${{ vars.US_COMMANDER_LANGUAGE_STYLE || secrets.US_COMMANDER_LANGUAGE_STYLE || 'plain_with_terms' }}
          US_COMMANDER_SHOW_TERM_EXPLANATIONS: ${{ vars.US_COMMANDER_SHOW_TERM_EXPLANATIONS || secrets.US_COMMANDER_SHOW_TERM_EXPLANATIONS || 'true' }}
          US_COMMANDER_MAX_LEARNING_NOTES: ${{ vars.US_COMMANDER_MAX_LEARNING_NOTES || secrets.US_COMMANDER_MAX_LEARNING_NOTES || '3' }}
          US_COMMANDER_OPTIONS_ENABLED: ${{ vars.US_COMMANDER_OPTIONS_ENABLED || secrets.US_COMMANDER_OPTIONS_ENABLED || 'true' }}
          US_COMMANDER_OPTION_MIN_DTE: ${{ vars.US_COMMANDER_OPTION_MIN_DTE || secrets.US_COMMANDER_OPTION_MIN_DTE || '14' }}
          US_COMMANDER_OPTION_MAX_DTE: ${{ vars.US_COMMANDER_OPTION_MAX_DTE || secrets.US_COMMANDER_OPTION_MAX_DTE || '45' }}
          US_COMMANDER_OPTION_MAX_RISK_PCT: ${{ vars.US_COMMANDER_OPTION_MAX_RISK_PCT || secrets.US_COMMANDER_OPTION_MAX_RISK_PCT || '1.0' }}
          US_COMMANDER_DIRECTNESS: ${{ vars.US_COMMANDER_DIRECTNESS || secrets.US_COMMANDER_DIRECTNESS || 'aggressive' }}
          US_COMMANDER_POSITION_SIZING: ${{ vars.US_COMMANDER_POSITION_SIZING || secrets.US_COMMANDER_POSITION_SIZING || 'relative' }}
          US_COMMANDER_CARD_STYLE: ${{ vars.US_COMMANDER_CARD_STYLE || secrets.US_COMMANDER_CARD_STYLE || 'command_first' }}
          US_COMMANDER_BRIEF_MODE: ${{ vars.US_COMMANDER_BRIEF_MODE || secrets.US_COMMANDER_BRIEF_MODE || 'true' }}
          US_COMMANDER_BRIEF_MAX_LINES: ${{ vars.US_COMMANDER_BRIEF_MAX_LINES || secrets.US_COMMANDER_BRIEF_MAX_LINES || '8' }}
          US_COMMANDER_VISUAL_CARD: ${{ vars.US_COMMANDER_VISUAL_CARD || secrets.US_COMMANDER_VISUAL_CARD || 'false' }}
          US_COMMANDER_TERM_GLOSSARY_MODE: ${{ vars.US_COMMANDER_TERM_GLOSSARY_MODE || secrets.US_COMMANDER_TERM_GLOSSARY_MODE || 'footer' }}
          US_COMMANDER_MAX_GLOSSARY_TERMS: ${{ vars.US_COMMANDER_MAX_GLOSSARY_TERMS || secrets.US_COMMANDER_MAX_GLOSSARY_TERMS || '2' }}
          MARKDOWN_TO_IMAGE_CHANNELS: ${{ vars.MARKDOWN_TO_IMAGE_CHANNELS || secrets.MARKDOWN_TO_IMAGE_CHANNELS || '' }}
          MD2IMG_ENGINE: ${{ vars.MD2IMG_ENGINE || secrets.MD2IMG_ENGINE || 'wkhtmltoimage' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          LOG_LEVEL: INFO
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'yfinance,tencent,akshare_sina,efinance,akshare_em' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p reports logs data
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi
          WINDOW="${{ github.event.inputs.window || 'auto' }}"
          echo "🧭 美股盘中雷达: window=$WINDOW force=${{ github.event.inputs.force_run || 'false' }}"
          python main.py --intraday-radar --intraday-window "$WINDOW" $FORCE_RUN_ARG

      - name: 查找去重标记
        id: marker
        if: always()
        run: |
          marker_path="$(find reports -maxdepth 1 -type f -name 'us-intraday-sent-*' | head -n 1 || true)"
          if [ -n "$marker_path" ]; then
            marker_name="$(basename "$marker_path")"
            echo "marker_name=$marker_name" >> "$GITHUB_OUTPUT"
            echo "marker_path=$marker_path" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 上传去重标记
        uses: actions/upload-artifact@v6
        if: steps.marker.outputs.found == 'true'
        with:
          name: ${{ steps.marker.outputs.marker_name }}
          path: ${{ steps.marker.outputs.marker_path }}
          retention-days: 2

      - name: 上传盘中雷达报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: us-intraday-radar-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 14
